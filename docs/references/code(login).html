<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anecdote World - Retro Space Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "accent-teal": "#2d7a7f",
                        "background-light": "#F9F4E8",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .vintage-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.06;
            pointer-events: none;
        }
        .retro-border {
            border: 3px solid #1c140d;
            box-shadow: 4px 4px 0px #1c140d;
        }
        .retro-border:active {
            box-shadow: 0px 0px 0px #1c140d;
            transform: translate(2px, 2px);
        }
        .rocket-svg {
            filter: drop-shadow(8px 8px 0px rgba(28, 20, 13, 0.1));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden">
<!-- Texture Overlay -->
<div class="fixed inset-0 vintage-grain z-50"></div>
<div class="relative flex flex-col min-h-screen max-w-md mx-auto px-6 py-12 justify-between z-10">
<!-- Header Section -->
<header class="text-center space-y-2 mt-8">
<div class="inline-block px-3 py-1 bg-primary/20 rounded-full text-primary font-bold text-xs uppercase tracking-widest mb-2">
                Mission Control
            </div>
<h1 class="text-5xl font-bold tracking-tighter text-[#1c140d] dark:text-slate-100 uppercase italic">
                Anecdote<br/>World
            </h1>
<p class="text-lg font-medium text-[#1c140d]/70 dark:text-slate-400 max-w-[280px] mx-auto leading-tight">
                Chart your journey through the stars and beyond.
            </p>
</header>
<!-- Hero Illustration -->
<div class="flex-1 flex items-center justify-center py-12">
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Abstract Retro Shapes -->
<div class="absolute w-48 h-48 bg-accent-teal rounded-full opacity-20"></div>
<div class="absolute w-32 h-32 bg-primary rounded-lg rotate-45 opacity-10"></div>
<!-- Stylized Rocket Illustration -->
<svg class="rocket-svg w-48 h-48 text-primary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C12 2 19 8 19 14C19 15.5 18 17 16.5 18L18 21L15 20L12 22L9 20L6 21L7.5 18C6 17 5 15.5 5 14C5 8 12 2 12 2Z" fill="currentColor" stroke="#1c140d" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<circle cx="12" cy="11" fill="#F9F4E8" r="2" stroke="#1c140d" stroke-width="1"></circle>
<path d="M9 16.5C9 16.5 10.5 16 12 16C13.5 16 15 16.5 15 16.5" stroke="#1c140d" stroke-linecap="round" stroke-width="1.5"></path>
</svg>
</div>
</div>
<!-- Action Section -->
<div class="space-y-4 mb-8">
<button class="w-full h-16 bg-white dark:bg-slate-100 text-[#1c140d] font-bold text-lg rounded-lg retro-border flex items-center justify-center gap-3 transition-all">
<span class="material-symbols-outlined scale-110">rocket_launch</span>
                Continue with Google
            </button>
<button class="w-full h-16 bg-[#FEE500] text-[#1c140d] font-bold text-lg rounded-lg retro-border flex items-center justify-center gap-3 transition-all">
<span class="material-symbols-outlined scale-110">chat_bubble</span>
                Continue with Kakao
            </button>
<div class="pt-4 flex items-center justify-center gap-4">
<span class="h-[2px] w-8 bg-[#1c140d]/20"></span>
<p class="text-sm font-bold text-[#1c140d]/60 dark:text-slate-400 uppercase tracking-widest">Variant 01 / 03</p>
<span class="h-[2px] w-8 bg-[#1c140d]/20"></span>
</div>
</div>
<!-- Footer -->
<footer class="text-center">
<p class="text-[#1c140d] dark:text-slate-300 font-medium">
                Already a traveler? 
                <a class="text-primary font-bold underline decoration-2 underline-offset-4" href="#">Log in</a>
</p>
</footer>
</div>
<!-- Decorative Stars -->
<div class="absolute top-20 left-10 text-accent-teal opacity-30 select-none">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">grade</span>
</div>
<div class="absolute bottom-40 right-12 text-primary opacity-20 select-none">
<span class="material-symbols-outlined text-6xl" style="font-variation-settings: 'FILL' 1">auto_awesome</span>
</div>
<div class="absolute top-1/2 left-4 text-[#1c140d] opacity-10 select-none">
<span class="material-symbols-outlined text-2xl">fiber_manual_record</span>
</div>
</body></html>
